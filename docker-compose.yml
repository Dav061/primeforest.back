version: '3.8'

services:
  # PostgreSQL база данных
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: primeforest_db
      POSTGRES_USER: primeforest_user
      POSTGRES_PASSWORD: StrongPassword123!
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -d primeforest_db -U primeforest_user"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Django бекенд
  backend:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
    # environment:
    #   # Django настройки
    #   - SECRET_KEY=django-insecure-primeforest-backend-2024-secret-key-change-me
    #   - DEBUG=True  # Временно для отладки
    #   - ALLOWED_HOSTS=localhost,127.0.0.1
      
    #   # База данных
    #   - DB_NAME=primeforest_db
    #   - DB_USER=primeforest_user
    #   - DB_PASSWORD=StrongPassword123!
    #   - DB_HOST=postgres
    #   - DB_PORT=5432

    #    # Отключаем HTTPS для разработки
    #   - SECURE_SSL_REDIRECT=False
    #   - SESSION_COOKIE_SECURE=False
    #   - CSRF_COOKIE_SECURE=False
      
    #   # CORS настройки
    #   - CORS_ALLOWED_ORIGINS=http://localhost:3000,http://127.0.0.1:3000,http://localhost:8000,http://127.0.0.1:8000
    #   - CORS_ALLOW_ALL_ORIGINS=True
    environment:
      # Django настройки
      - SECRET_KEY=django-insecure-primeforest-backend-2024-secret-key-change-me
      - DEBUG=True
      - ALLOWED_HOSTS=*  # ← ИЗМЕНИТЬ
      
      # База данных
      - DB_NAME=primeforest_db
      - DB_USER=primeforest_user
      - DB_PASSWORD=StrongPassword123!
      - DB_HOST=postgres
      - DB_PORT=5432

      # Отключаем HTTPS для разработки
      - SECURE_SSL_REDIRECT=False
      - SESSION_COOKIE_SECURE=False
      - CSRF_COOKIE_SECURE=False
      
      # CORS настройки
      - CORS_ALLOWED_ORIGINS=http://localhost:3000,http://127.0.0.1:3000,http://localhost:8000,http://127.0.0.1:8000
      - CORS_ALLOW_ALL_ORIGINS=True
      
      # Для Nginx (ДОБАВИТЬ ЭТИ 2 СТРОКИ)
      - USE_X_FORWARDED_HOST=True
      - SECURE_PROXY_SSL_HEADER=HTTP_X_FORWARDED_PROTO,https

    volumes:
      - ./media:/app/media
      - ./static:/app/static
    ports:
      - "8000:8000"
    command: >
      sh -c "sleep 5 &&
            python manage.py migrate &&
            python manage.py collectstatic --noinput &&
            gunicorn woodgood.wsgi:application --bind 0.0.0.0:8000 --workers 3"

volumes:
  postgres_data:
